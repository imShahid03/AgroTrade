<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriTrade Platform</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* CSS Variables & Base Setup */
    </style>
  </head>
  <body>
    <section id="login-view">
      <div class="login-card">
        <h2>Welcome to AgriTrade</h2>
        <p style="margin-bottom: 20px; color: var(--text-muted)">
          Please select your role and enter your name to continue.
        </p>
        <form id="login-form">
          <div class="role-toggle">
            <input
              type="radio"
              id="role-farmer"
              name="role"
              value="farmer"
              style="display: none"
              checked
            />
            <label for="role-farmer">I am a Farmer</label>
            <input
              type="radio"
              id="role-buyer"
              name="role"
              value="buyer"
              style="display: none"
            />
            <label for="role-buyer">I am a Buyer</label>
          </div>
          <label>Full Name</label>
          <input
            type="text"
            id="username"
            placeholder="e.g. John Doe"
            required
          />
          <button type="submit" class="btn btn-primary" style="width: 100%">
            Enter Platform
          </button>
        </form>
      </div>
    </section>

    <header id="main-header" class="hidden">
      <h2 id="header-title">AgriTrade</h2>
      <div>
        <span id="user-greeting" style="margin-right: 15px"></span>
        <button id="logout-btn" class="btn btn-danger">Logout</button>
      </div>
    </header>

    <main id="farmer-dashboard" class="hidden">
      <div class="dashboard-controls">
        <h2>My Listed Commodities</h2>
        <button
          class="btn btn-primary"
          onclick="openModal('add-commodity-modal')"
        >
          + Add Commodity
        </button>
      </div>
      <div class="grid" id="farmer-commodity-list"></div>
    </main>

    <main id="buyer-dashboard" class="hidden">
      <div class="dashboard-controls">
        <h2>Marketplace</h2>
        <input
          type="text"
          id="search-bar"
          class="search-bar"
          placeholder="Search commodities..."
          onkeyup="handleSearch()"
        />
      </div>
      <div class="grid" id="buyer-commodity-list"></div>
    </main>

    <div id="add-commodity-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Add New Commodity</h3>
          <button
            class="btn btn-outline"
            onclick="closeModal('add-commodity-modal')"
          >
            X
          </button>
        </div>
        <form id="add-commodity-form">
          <label>Commodity Name</label>
          <input type="text" id="comm-name" required />

          <div style="display: flex; gap: 10px">
            <div style="flex: 2">
              <label>Quantity for Sale</label>
              <input type="number" id="comm-qty" required />
            </div>
            <div style="flex: 1">
              <label>Unit</label>
              <select id="comm-unit">
                <option value="Quintals">Quintals</option>
                <option value="Tons">Tons</option>
                <option value="Kg">Kg</option>
              </select>
            </div>
          </div>

          <label>Min Price per Unit (₹)</label>
          <input type="number" id="comm-price" required />

          <div style="display: flex; gap: 10px">
            <div style="flex: 1">
              <label>District</label>
              <input type="text" id="comm-district" required />
            </div>
            <div style="flex: 1">
              <label>State</label>
              <input type="text" id="comm-state" required />
            </div>
          </div>

          <label>Terms & Conditions (Transport/Delivery)</label>
          <textarea id="comm-terms" rows="3" required></textarea>

          <button type="submit" class="btn btn-primary" style="width: 100%">
            List Commodity
          </button>
        </form>
      </div>
    </div>

    <div id="view-commodity-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="view-comm-title">Commodity Details</h3>
          <button
            class="btn btn-outline"
            onclick="closeModal('view-commodity-modal')"
          >
            X
          </button>
        </div>
        <div id="view-comm-details"></div>
        <h4 style="margin-top: 20px">Active Bids</h4>
        <div id="view-comm-bids" class="bids-list"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
